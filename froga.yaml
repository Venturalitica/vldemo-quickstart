apiVersion: venturalitica.ai/v1alpha1
kind: AISystem

# ── 1. Identidad y finalidad ─────────────────────────────────────────────────
system:
  name: quickstart-education
  intended_purpose: "Predicción de aprobado/suspenso de estudiantes de secundaria a partir de factores escolares (ejemplo mínimo open-core)."
  organization: quickstart
  version: "1.0.0"
  decisions: [predicted_pass, predicted_fail]
  affected_persons: [estudiantes]
  component_type: ai-model
  potential_misuses:
    - id: mu.enrollment-without-review
      description: "Usar la predicción para decisiones de matrícula/itinerario sin revisión humana."
      addressed_by: [risk.unfair-prediction]

# ── 2. Tarea ─────────────────────────────────────────────────────────────────
task:
  modality: tabular
  type: classification

# ── 3. Marco regulatorio — SOLO el escalón GRATIS (ISO 23894) ────────────────
# scope: clasificación educativa (EU AI Act Anexo III §3) — alto riesgo. El usuario GRATIS
#        gobierna el ciclo RDD y se autocomprueba contra ISO 23894 (buena práctica). La
#        presunción prEN 18228 + sectoriales + Anexo IV son el escalón de PAGO (no se declaran).
context:
  applicable_standards:
    - iso/23894@2023

# ── 4. Datos y modelo ────────────────────────────────────────────────────────
dataset: { croissant: data/student.croissant.json }
artifacts:
  model: { kind: logreg, seed: 42 }

